
            <!DOCTYPE html>
            <html lang="es">
            <head>
                <meta charset="UTF-8">
                <title>Glyph - Deep Research Node</title>
                <script src="https://js.puter.com/v2/"></script>
                <style>
                    body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 20px; line-height: 1.6; }
                    #header { border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; font-size: 0.9em; }
                    #content { white-space: pre-wrap; background: #111; padding: 20px; border-radius: 5px; border: 1px solid #333; min-height: 300px; }
                    .loading { color: #888; font-style: italic; }
                </style>
            </head>
            <body>
                <div id="header">
                    [GLYPH SYSTEM NODE]: Invocando Perplexity via Puter.js<br>
                    [STATUS]: Investigando...<br>
                    [QUERY]: gratis
                </div>
                <div id="content"><span class="loading">Iniciando secuencia de búsqueda...</span></div>
                <script>
                    const contentDiv = document.getElementById('content');
                    async function run() {
                        try {
                            const response = await puter.ai.chat("gratis", {
                                model: "perplexity/sonar-deep-research",
                                stream: true
                            });
                            contentDiv.innerHTML = "";
                            for await (const part of response) {
                                if (part?.text) {
                                    contentDiv.innerText += part.text;
                                    window.scrollTo(0, document.body.scrollHeight);
                                }
                            }
                            contentDiv.innerHTML += '<br><br><strong>[INVESTIGACIÓN FINALIZADA]</strong>';
                        } catch (err) {
                            contentDiv.innerHTML = "ERROR CRÍTICO: " + err.message;
                        }
                    }
                    run();
                </script>
            </body>
            </html>
